<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Transit</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<header class="header">
  <div class="logo">
    <img src="https://cdn-icons-png.flaticon.com/512/3448/3448339.png">
    <span>Smart Transit</span>
  </div>

  <div class="lang-toggle">
    <button onclick="setLang('en', this)" class="active">EN</button>
<button onclick="setLang('mr', this)">मराठी</button>
<button onclick="setLang('hi', this)">हिंदी</button>
  </div>
</header>

<section class="hero">
  <img src="https://cdn-icons-png.flaticon.com/512/3448/3448339.png" class="bus-img">
  <h1 id="title">Welcome to Smart Transit</h1>
  <p>Track • Book • Travel Smarter</p>
</section>

<div class="card">

  <div class="tabs">
    <button class="tab active" onclick="switchTab('otp')">Mobile OTP</button>
    <button class="tab" onclick="switchTab('email')">Email Login</button>
  </div>

  <!-- OTP -->
  <input id="mobile" type="tel" maxlength="10" placeholder="Enter Mobile Number">
    <div class="input-box">
      <span>+91</span>
      <input placeholder="Enter Mobile Number">
    </div>
    <button class="btn" onclick="sendOTP()">Send OTP</button>
  </div>

  <!-- EMAIL -->
  <div id="email" class="tab-content">
    <div class="input-box">
      <input placeholder="Enter Email">
    </div>
    <button class="btn" onclick="sendOTP()">Login</button>
  </div>

  <p>New to Smart Transit?</p>
  <button class="outline-btn" onclick="window.location.href='create.html'">
    Create Account
  </button>

</div>

<footer>
  <p>Privacy Policy | Terms & Conditions | Help & Support</p>
</footer>

</div>

<script src="script.js"></script>
</body>
</html>
