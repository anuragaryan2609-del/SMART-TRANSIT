<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Transit</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">🚌 Smart Transit</div>

    <div class="lang">
      <button class="active">EN</button>
      <button>मराठी</button>
      <button>हिंदी</button>
    </div>
  </div>

  <!-- SINGLE LOGO (FIXED) -->
  <img src="https://cdn-icons-png.flaticon.com/512/61/61231.png" class="bus-img">

  <!-- TITLE -->
  <h2>Welcome to Smart Transit</h2>
  <p class="sub">Track • Book • Travel Smarter</p>

  <!-- LOGIN CARD -->
  <div class="card">

    <div class="tabs">
      <button class="tab active" onclick="showMobile()">Mobile OTP</button>
      <button class="tab" onclick="showEmail()">Email Login</button>
    </div>

    <!-- MOBILE -->
    <div id="mobileBox">
      <input id="mobile" placeholder="+91 Enter Mobile Number" maxlength="10">
      <button class="btn" onclick="sendOTP()">Send OTP</button>
    </div>

    <!-- EMAIL -->
    <div id="emailBox" style="display:none;">
      <input id="email" placeholder="Enter Email">
      <button class="btn" onclick="loginEmail()">Login</button>
    </div>

    <!-- OTP -->
    <div id="otpBox" style="display:none;">
      <input id="otp" placeholder="Enter 5-digit OTP" maxlength="5">
      <button class="btn" onclick="verifyOTP()">Verify OTP</button>
    </div>

  </div>

  <p class="small">New to Smart Transit?</p>
  <button class="outline">Create Account</button>

</div>

<script src="script.js"></script>

</body>
</html>
