<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Transit</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <div class="logo">
    <img src="https://cdn-icons-png.flaticon.com/512/744/744465.png">
    <span>Smart Transit</span>
  </div>

  <div class="lang-toggle">
    <button onclick="setLang('en')" class="active">EN</button>
    <button onclick="setLang('mr')">मराठी</button>
    <button onclick="setLang('hi')">हिंदी</button>
  </div>
</header>

<section class="hero">
  <img src="https://cdn-icons-png.flaticon.com/512/61/61231.png">
  <h1 id="title">Welcome to Smart Transit</h1>
  <p>Track • Book • Travel Smarter</p>
</section>

<div class="card">

  <div class="tabs">
    <button class="tab active" onclick="switchTab('otp')">Mobile OTP</button>
    <button class="tab" onclick="switchTab('email')">Email Login</button>
  </div>

  <div id="otp" class="tab-content active">
    <div class="input-box">
      <span>+91</span>
      <input id="mobile" placeholder="Enter Mobile Number">
    </div>
    <button class="btn" onclick="sendOTP()">Send OTP</button>
  </div>

  <div id="email" class="tab-content">
    <div class="input-box">
      <input id="emailInput" placeholder="Enter Email">
    </div>
    <button class="btn" onclick="sendOTP()">Login</button>
  </div>

  <p>New to Smart Transit?</p>
  <button class="outline-btn" onclick="window.location.href='create.html'">Create Account</button>

</div>

<footer>
  <p>Privacy Policy | Terms & Conditions | Help & Support</p>
</footer>

<script src="script.js"></script>
</body>
</html>
