<!DOCTYPE html>
<html>
<head>
<title>Home</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>Hello Anuragaryan 👋</h2>

<div class="card">
  <input id="from" placeholder="From">
  <input id="to" placeholder="To">
  <button class="btn" onclick="searchBus()">Search Buses</button>
</div>

<div id="busList"></div>

<div class="grid">
  <div class="feature-card" onclick="location.href='track.html'">📍 Track</div>
  <div class="feature-card" onclick="location.href='booking.html'">🎟️ Book</div>
  <div class="feature-card" onclick="location.href='ticket.html'">📄 Tickets</div>
  <div class="feature-card" onclick="location.href='admin.html'">⚙️ Admin</div>
</div>

</div>

<script>
function searchBus(){
  let list = document.getElementById("busList");
  list.innerHTML = "";

  for(let i=1;i<=50;i++){
    let bus = document.createElement("div");
    bus.className = "bus-card";
    bus.innerHTML = `
      <b>MH15KW${1000+i}</b><br>
      Pune → Mumbai<br>
      Time: ${6+i}:00 AM<br>
      <button onclick="location.href='booking.html'">Book</button>
    `;
    list.appendChild(bus);
  }
}
</script>

</body>
</html>
