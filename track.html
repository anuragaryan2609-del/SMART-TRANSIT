<!DOCTYPE html>
<html>
<head>
<title>Track</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>Live Tracking</h2>

<div class="map">
  <div id="bus">🚌</div>
</div>

</div>

<script>
let b=document.getElementById("bus");
let p=0;

setInterval(()=>{
  p+=5;
  b.style.left=p+"%";
  if(p>90)p=0;
},500);
</script>

</body>
</html>
