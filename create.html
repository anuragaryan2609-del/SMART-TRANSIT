<!DOCTYPE html>
<html>
<head>
<title>Create Account</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>Create Account</h2>

<div class="card">

  <input id="name" placeholder="Full Name" class="otp-input">
  <input id="mobile" placeholder="Mobile Number" maxlength="10" class="otp-input">
  <input id="email" placeholder="Email" class="otp-input">
  <input id="password" type="password" placeholder="Password" class="otp-input">

  <button class="btn" onclick="register()">Create Account</button>

</div>

<p style="text-align:center;">Already have account?</p>
<button class="outline-btn" onclick="goLogin()">Login</button>

</div>

<script>

function register(){

  let name = document.getElementById("name").value;
  let mobile = document.getElementById("mobile").value;
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  if(!name || !mobile || !email || !password){
    alert("Fill all fields");
    return;
  }

  if(!/^[0-9]{10}$/.test(mobile)){
    alert("Enter valid mobile");
    return;
  }

  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    alert("Enter valid email");
    return;
  }

  alert("Account Created Successfully 🎉");

  window.location.href = "index.html";
}

function goLogin(){
  window.location.href = "index.html";
}

</script>

</body>
</html>
