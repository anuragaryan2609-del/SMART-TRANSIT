<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>Admin</h2>

<input id="busNo" placeholder="Bus Number">
<button class="btn" onclick="add()">Add Bus</button>

<ul id="list"></ul>

</div>

<script>
function add(){
  let v=document.getElementById("busNo").value;
  let li=document.createElement("li");
  li.innerText=v;
  document.getElementById("list").appendChild(li);
}
</script>

</body>
</html>
