<!DOCTYPE html>
<html>
<head>
<title>Ticket</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>🎟️ Ticket Confirmed</h2>

<div class="card">

  <p><b>Passenger:</b> Anuragaryan</p>
  <p><b>Route:</b> Pune → Mumbai</p>
  <p><b>Seats:</b> <span id="seats"></span></p>
  <p><b>Bus No:</b> MH15KW1234</p>
  <p><b>Status:</b> Confirmed ✅</p>

</div>

</div>

<script>
let seats = localStorage.getItem("seats");
document.getElementById("seats").innerText = seats;
</script>

</body>
</html>
