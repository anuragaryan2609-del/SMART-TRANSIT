<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Transit</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="logo">🚌 Smart Transit</div>

    <div class="lang-toggle">
      <button class="active">EN</button>
      <button>मराठी</button>
      <button>हिंदी</button>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <img src="https://cdn-icons-png.flaticon.com/512/61/61231.png" alt="bus">
    <h1>Welcome to Smart Transit</h1>
    <p>Track • Book • Travel Smarter</p>
  </section>

  <!-- LOGIN CARD -->
  <div class="card">

    <div class="tabs">
      <button class="tab active" onclick="switchTab('otp')">Mobile OTP</button>
      <button class="tab" onclick="switchTab('email')">Email Login</button>
    </div>

    <!-- OTP -->
    <div id="otp" class="tab-content active">
      <div class="input-box">
        <span>+91</span>
        <input type="text" placeholder="Enter Mobile Number">
      </div>
      <button class="btn" onclick="goToHome()">Send OTP</button>
    </div>

    <!-- EMAIL -->
    <div id="email" class="tab-content">
      <div class="input-box">
        <input type="email" placeholder="Enter Email">
      </div>
      <button class="btn" onclick="goToHome()">Login</button>
    </div>

    <p class="new-user">New to Smart Transit?</p>
    <button class="outline-btn">Create Account</button>

  </div>

  <!-- FOOTER -->
  <footer>
    <p>Privacy Policy | Terms & Conditions | Help & Support</p>
  </footer>

  <!-- JS -->
  <script src="script.js"></script>

</body>
</html>
